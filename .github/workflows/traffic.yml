name: Highway Traffic Monitor

on:
  push:
  schedule:
    # 台灣時間平日早上 07:35 (UTC 23:35)
    - cron: '35 23 * * 1-5'
  workflow_dispatch: # 讓你可以點擊按鈕手動測試

jobs:
  traffic-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Traffic Script
        env:
          # 這裡對應你在 GitHub Secrets 存的金鑰名稱
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          TRAFFIC_BOT_TOKEN: ${{ secrets.TRAFFIC_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python highway.py
