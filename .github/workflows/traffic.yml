name: Traffic Bot

on:
  workflow_dispatch: # 允許你隨時去點 "Run workflow" 手動測試
  # schedule:
  #   - cron: '45 23 * * 0-4' # 台灣時間星期一到五，早上 07:45 自動執行 (如果要開啟，把這兩行最前面的 # 刪除即可)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (安裝截圖工具與套件)
        run: |
   
          pip install requests

      - name: Run Traffic Script
        env:
          TDX_ID: ${{ secrets.TDX_ID }}
          TDX_SECRET: ${{ secrets.TDX_SECRET }}
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python highway.py
