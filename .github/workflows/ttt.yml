name: Separate Stock Monitors

on:
  push:
  schedule:
    - cron: '5 1 * * 1-5'  # 台灣 09:05
    - cron: '35 5 * * 1-5' # 台灣 13:35
  workflow_dispatch:

jobs:
  run-all-monitors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run All Scripts
        env:
          # 這裡必須對應你截圖中的 Secret 名稱
          TDX_ID: ${{ secrets.TDX_ID }}
          TDX_SECRET: ${{ secrets.TDX_SECRET }}
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python highway.py
