name: Run My Python Automation
on: [push, workflow_dispatch] # 當上傳代碼或點擊手動執行時觸發

jobs:
  automation-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Execute script
        env:
          # 這裡會讀取你設定的 Secrets 並傳給 Python
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py # 這行會去執行步驟 1 建立的檔案
