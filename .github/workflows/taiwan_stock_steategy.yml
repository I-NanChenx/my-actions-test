name: Stock Monitor Automation

on:
  push:
    branches: [ "main" ]
  schedule:
    # 台灣時間週一至週五 09:05 (UTC 01:05)
    - cron: '5 1 * * 1-5'
    # 台灣時間週一至週五 13:35 (UTC 05:35)
    - cron: '35 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run Python Script
        env:
          # 將截圖中的 Secrets 對應到 Python 讀取的變數
          TSMC_TOKEN: ${{ secrets.TSMC_BOT_TOKEN }}
          ETF878_TOKEN: ${{ secrets.I00878_BOT_TOKEN }}
          ETF56_TOKEN: ${{ secrets.I0056_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py
