name: Separate Stock Monitors

on:
  push:
  schedule:
    - cron: '5 1 * * 1-5'  # 台灣 09:05
    - cron: '35 5 * * 1-5' # 台灣 13:35
  workflow_dispatch:

jobs:
  run-all-monitors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run All Scripts
        env:
          # 這裡必須對應你截圖中的 Secret 名稱
          TSMC_TOKEN: ${{ secrets.TSMC_BOT_TOKEN }}
          ETF878_TOKEN: ${{ secrets.I00878_BOT_TOKEN }}
          ETF56_TOKEN: ${{ secrets.I0056_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python esmt.py
          python etf878.py
          python tsmc.py
          python etf56.py
